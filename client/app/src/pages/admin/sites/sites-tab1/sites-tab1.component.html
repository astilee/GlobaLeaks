<div class="row">
  <div class="col-md-12">
    <div>
      <span>{{'Sites'|translate}}</span>
      <button class="btn btn-sm btn-primary show-add-tenant-btn" type="button" (click)="toggleAddTenant()">
        <i class="fas fa-plus"></i>
        <span>{{'Add'|translate}}</span>
      </button>
    </div>
  </div>
</div>
@if (showAddTenant) {
  <div class="row">
    <div class="col-md-6">
      <form ngForm="newTenantForm" #newTenantForm="ngForm" class="addTenant" novalidate>
        <div class="form-group">
          <label>
            <span>{{'Name'|translate}}</span>
            <span class="text-danger" ngbTooltip="{{'This field is mandatory' | translate}}">*</span>
          </label>
          <div>
            <input name="newTenant.name" class="form-control" [(ngModel)]="newTenant.name" maxlength="120" type="text" required />
          </div>
        </div>
        @if (siteProfiles.length) {
          <div class="form-group">
            <label>{{ 'Profile:' | translate }}</label>
            <select name="profile" class="form-select-custom" [(ngModel)]="newTenant.profile" required>
              <option value="default">DEFAULT</option>
              @for (tenant of siteProfiles; track tenant) {
                @if (tenant.active) {
                  <option [value]="tenant.uuid">{{tenant.name}}</option>
                }
              }
            </select>
          </div>
        }
        <div class="form-group clearfix">
          <button id="add-btn" class="float-start btn btn-primary" [disabled]="newTenantForm.invalid" (click)="addTenant();toggleAddTenant()" type="button">
            <i class="fas fa-plus"></i>
            <span>{{'Add'|translate}}</span>
          </button>
        </div>
      </form>
    </div>
  </div>
}
<app-paginated-interface [items]="tenants" [filterField]="'name'" [itemsPerPage]="20" [orderBy]="'id'">
  <ng-template #content let-item="item" let-index="index">
    <form id="tenant-{{index}}"  #editTenant="ngForm" novalidate>
      <src-siteslist [tenant]="item" [tenants]="tenants"></src-siteslist>
    </form>
  </ng-template>
</app-paginated-interface>
